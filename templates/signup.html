{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-md-6 col-lg-4">
        <div class="clean-card p-4 p-md-5">
            <div class="text-center mb-4">
                <h5 class="fw-semibold mb-2">Create Account</h5>
                <p class="text-muted small">Sign up to use CareConnect tools.</p>
            </div>
            
            <form method="POST" action="/signup">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-medium">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Create username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small fw-medium">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Create password" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2">Sign Up</button>
            </form>
            
            <div class="text-center mt-4 pt-4 border-top">
                <p class="text-muted small mb-0">Already have an account? <a href="/login" class="text-dark fw-medium text-decoration-none ms-1">Log in</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
