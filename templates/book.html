{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-lg-5 col-md-7">
        <div class="clean-card p-4 p-md-5">
            <div class="text-center mb-4">
                <h5 class="fw-semibold text-dark mb-2">Book Session</h5>
                <p class="text-muted small">Schedule an appointment with a professional.</p>
            </div>
            
            <form method="POST" action="/book">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-medium">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
                </div>
                
                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <label class="form-label text-muted small fw-medium">Date</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label text-muted small fw-medium">Time</label>
                        <input type="time" name="time" class="form-control" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2">Confirm Booking</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
