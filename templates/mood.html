{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-lg-5 col-md-7">
        <div class="clean-card p-4 p-md-5">
            
            <h5 class="fw-semibold mb-2 text-dark">Log Mood</h5>
            <p class="text-muted small mb-4">Select the state that best maps to your current feelings.</p>
            
            <form method="POST">
                <div class="mb-4">
                    <select name="mood" class="form-select bg-light border-0" style="height: 50px; cursor: pointer;" required>
                        <option value="" disabled selected>Select an option...</option>
                        <option value="happy">Happy</option>
                        <option value="stressed">Stressed</option>
                        <option value="anxious">Anxious</option>
                        <option value="sad">Sad</option>
                        <option value="depressed">Depressed</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2">Save Mood</button>
            </form>
            
        </div>
    </div>
</div>
{% endblock %}
