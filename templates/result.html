{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-6 col-md-8">
        <div class="clean-card p-5 text-center">
            
            <i class="bi bi-check2-circle fs-1 text-dark mb-3"></i>
            <h5 class="fw-semibold mb-4 text-dark">Saved Successfully</h5>
            
            <div class="bg-light p-4 rounded-3 border mb-5 text-muted small fst-italic mx-auto" style="max-width: 80%;">
                "{{ message }}"
            </div>
            
            <div class="d-flex justify-content-center gap-3">
                <a href="/history" class="btn btn-light px-4">View History</a>
                <a href="/" class="btn btn-primary px-4">Done</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
